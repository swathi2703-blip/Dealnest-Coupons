spring.config.import=optional:file:.env[.properties]
server.port=${PORT:4000}
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017}
spring.data.mongodb.database=${MONGODB_DB_NAME:dealnest}
app.mongo.bootstrap.fail-fast=${APP_MONGO_BOOTSTRAP_FAIL_FAST:false}
app.payment.reveal-expiry-seconds=${APP_PAYMENT_REVEAL_EXPIRY_SECONDS:300}
app.payment.reveal-link-base-url=${APP_PAYMENT_REVEAL_LINK_BASE_URL:http://localhost:8080/coupon/reveal}
app.payment.platform-fee-percent=${APP_PAYMENT_PLATFORM_FEE_PERCENT:15}
app.payment.payout.auto-enabled=${APP_PAYMENT_PAYOUT_AUTO_ENABLED:true}
app.payment.payout.source-account-number=${APP_PAYMENT_PAYOUT_SOURCE_ACCOUNT_NUMBER:}
app.admin.emails=${APP_ADMIN_EMAILS:}
app.mail.from=${APP_MAIL_FROM:no-reply@dealnest.local}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
