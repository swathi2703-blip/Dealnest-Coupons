services:
  - type: web
    name: dealnest-backend
    runtime: docker
    rootDir: dealnest/backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: dealnest
      - key: FIREBASE_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: APP_PAYMENT_PLATFORM_FEE_PERCENT
        value: 15
      - key: APP_PAYMENT_PAYOUT_AUTO_ENABLED
        value: true
      - key: APP_PAYMENT_PAYOUT_SOURCE_ACCOUNT_NUMBER
        sync: false
      - key: APP_ADMIN_EMAILS
        sync: false
      - key: APP_MAIL_FROM
        value: no-reply@dealnest.local
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        value: 587
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_SMTP_AUTH
        value: true
      - key: SPRING_MAIL_SMTP_STARTTLS_ENABLE
        value: true

  - type: web
    name: dealnest-frontend
    runtime: static
    rootDir: dealnest/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
